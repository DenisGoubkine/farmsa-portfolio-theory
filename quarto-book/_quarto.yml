project:
  type: book
  output-dir: _book
  resources:
    - data/**
    - estimators.py
    - M6_portfolio_optimizer.ipynb

execute:
  enabled: false
  freeze: auto

book:
  title: "FARMSA Portfolio Theory"
  subtitle: "Covariance Estimation, Risk, and Portfolio Construction"
  author: "Denis Goubkine and FARMSA Research Group"
  date: "March 2026"
  search: true
  page-navigation: true
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - chapters/summary.ipynb
    - part: "Covariance Estimators"
      chapters:
        - chapters/m1_ledoit_wolf.ipynb
        - chapters/m2_rmt_cleaning.ipynb
        - chapters/m3_factor_models.ipynb
        - chapters/m4_dcc_garch.ipynb
    - part: "Applications"
      chapters:
        - chapters/m5_mpt_vs_pmpt.ipynb
        - chapters/m6_optimizer.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    code-summary: "Show code"
    css: assets/report.css
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
    include-after-body:
      - assets/code-toggle.html
